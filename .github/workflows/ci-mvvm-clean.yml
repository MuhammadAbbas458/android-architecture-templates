name: CI — mvvm-clean

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ci-mvvm-clean.yml'
      - '.github/workflows/reusable-android-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ci-mvvm-clean.yml'
      - '.github/workflows/reusable-android-ci.yml'

  # Allow manual runs from the Actions tab
  workflow_dispatch:

concurrency:
  group: ci-mvvm-clean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/reusable-android-ci.yml
    with:
      # The mvvm-clean Gradle project lives at the repository root
      working-directory: '.'
      template-name: mvvm-clean
      java-version: '17'
