name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Debug build so the APK is signed with the auto-generated debug key
      # and installable without any signing secrets. Fine for a demo app;
      # a Play Store release would use a real keystore instead.
      - name: Assemble APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk notes-mvvm-clean-${{ github.ref_name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: notes-mvvm-clean-*.apk
          generate_release_notes: true
